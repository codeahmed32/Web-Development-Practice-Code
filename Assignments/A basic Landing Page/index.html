<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Conf Ticket viewer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <!-- logo & Nav items div-->

    <div class="logo-title-container">
        <h2>Coding Conf</h2>

        <div class="logo">
            <a href="#">More Info</a>
            <a href="#">Contact Us</a>
            <a href="#">FAQS</a>
            <a href="#">Report Issue</a>
        </div>


        <div class="nav-elements">
            <button>Join Now</button>
        </div>
    </div>


    <!-- Main Text section -->


    <div class="main-text">
        <div class="texts">
            <h1 class="welcome-text">Congrats, <span class="color-orange"> Ahmed Abdullah!</span> Your Ticket is ready.
            </h1>
            <p>We've emailed your ticket to <span class="color-orange">abdullahahmad6782@mail.com</span> and will send
                updates in the run up to the event.
            </p>
        </div>
    </div>


    <!--main ticket structure-->
    <div class="ticket-container">
        <div class="ticket-wrapper">
            <div class="ticket-title">
                <!-- <img src="./assets/images/logo-mark.svg" alt=""> -->
                <h2 class="ticket-logo-text">Coding Conf</h2>
            </div>
            <!-- 2nd part of ticket -->
            <div class="profile-name-container">
                <div class="image-person">
                    <img src="./assets/images/image-avatar.jpg" alt="">
                </div>

                <div class="person-details">
                    <h2>Ahmed Abdullah</h2>
                    <i class="fa-solid fa-location-crosshairs"></i><span>July 4, 2026 / Austin, Texas</span>
                    <p>Seminar Access Card</p>
                </div>
            </div>

            <div class="access-btn">
                <button>Access From Here</button>
            </div>

        </div>

    </div>
</body>

</html>
