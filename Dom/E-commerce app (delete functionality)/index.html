<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-commerce List Manager</title>
  <style>
    body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; }
    #product-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    
    .product-card { 
      background: white; 
      border-radius: 8px; 
      overflow: hidden; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
      transition: transform 0.2s;
    }

    .product-card img { width: 100%; height: 200px; object-fit: cover; }
    
    .card-content { padding: 15px; }
    
    .actions { display: flex; gap: 10px; margin-top: 15px; }
    
    button { border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; color: white; }
    .update-btn { background-color: #3498db; }
    .delete-btn { background-color: #e74c3c; }
    button:hover { opacity: 0.8; }
  </style>
</head>
<body>

  <h1>My Store Items</h1>
  <div id="product-list">
    </div>

  <script src="script.js"></script>
</body>
</html>
